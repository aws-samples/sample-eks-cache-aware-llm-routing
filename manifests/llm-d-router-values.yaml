## llm-d Router Helm values for precise prefix-cache-aware routing
## Install with: helm install cache-aware-routing oci://ghcr.io/llm-d/charts/llm-d-router-gateway-dev --version v0 -n inference -f llm-d-router-values.yaml

httpRoute:
  create: true
  inferenceGatewayName: inference-gateway

provider:
  name: none

router:
  tokenizer:
    enabled: true
    modelName: mistralai/Mistral-7B-Instruct-v0.3

  epp:
    replicas: 1
    flags:
      metrics-endpoint-auth: false
      model-server-metrics-port: 8000
      secure-serving: false
      v: 2
    env:
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN
    image:
      registry: ghcr.io/llm-d
      repository: llm-d-router-endpoint-picker-dev
      tag: main
    resources:
      limits:
        memory: 16Gi
      requests:
        cpu: 2
        memory: 8Gi
    pluginsConfigFile: precise-plugins.yaml
    pluginsCustomConfig:
      precise-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: token-producer
          parameters:
            modelName: mistralai/Mistral-7B-Instruct-v0.3
            vllm:
              url: "http://localhost:8000"
        - type: endpoint-notification-source
        - type: precise-prefix-cache-producer
          parameters:
            tokenProcessorConfig:
              blockSize: 64
            indexerConfig:
              kvBlockIndexConfig:
                enableMetrics: true
            kvEventsConfig:
              topicFilter: "kv@"
              concurrency: 8
              discoverPods: true
              podDiscoveryConfig:
                socketPort: 5556
        - type: prefix-cache-scorer
          parameters:
            prefixMatchInfoProducerName: precise-prefix-cache-producer
        - type: kv-cache-utilization-scorer
        - type: queue-scorer
        - type: no-hit-lru-scorer
        - type: max-score-picker
        dataLayer:
          sources:
          - pluginRef: endpoint-notification-source
            extractors:
            - pluginRef: precise-prefix-cache-producer
        schedulingProfiles:
        - name: default
          plugins:
          - pluginRef: kv-cache-utilization-scorer
            weight: 2.0
          - pluginRef: queue-scorer
            weight: 2.0
          - pluginRef: prefix-cache-scorer
            weight: 3.0
          - pluginRef: no-hit-lru-scorer
            weight: 2.0
          - pluginRef: max-score-picker

  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  inferencePool:
    failureMode: FailOpen

  modelServers:
    matchLabels:
      app: vllm-inference
      llm-d.ai/guide: cache-aware-routing
    protocol: http
    targetPort: 8000
